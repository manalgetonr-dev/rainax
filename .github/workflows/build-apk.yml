name: Build RAINAX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Copy ytdlp_helper.py to Chaquopy source set
        run: |
          mkdir -p android/app/src/main/python
          cp assets/ytdlp_helper.py android/app/src/main/python/ytdlp_helper.py

      - name: Download ffmpeg ARM64 binary into assets
        run: |
          mkdir -p assets
          # Download static ffmpeg build for Android ARM64
          curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-linux-arm64" \
            -o assets/ffmpeg
          chmod +x assets/ffmpeg
          ls -lh assets/ffmpeg

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        run: find . -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainax-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
