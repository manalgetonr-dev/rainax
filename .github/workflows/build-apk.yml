name: Build RAINAX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (required by Gradle + Chaquopy)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Python 3.12 (must match Chaquopy version in build.gradle)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 4. Install Flutter (stable)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      # 5. Flutter deps
      - name: Install Flutter dependencies
        run: flutter pub get

      # 6. Copy Python helper to Chaquopy source set
      - name: Copy ytdlp_helper.py to Chaquopy source set
        run: |
          mkdir -p android/app/src/main/python
          cp assets/ytdlp_helper.py android/app/src/main/python/ytdlp_helper.py

      # 7. Accept Android SDK licenses
      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      # 8. Build debug APK via Gradle directly (bypasses Flutter path detection)
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 9. Find and display APK location
      - name: Locate APK
        run: find . -name "*.apk" -type f

      # 10. Upload APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainax-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
