org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true
# Suppress the deprecated apply script warning for Flutter plugin loader
# (only needed until Flutter fully migrates to declarative plugin syntax)
android.suppressUnsupportedOptionWarnings=android.suppressUnsupportedOptionWarnings
