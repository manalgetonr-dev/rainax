plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.rainax.downloader"
    compileSdk flutter.compileSdkVersion
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.rainax.downloader"
        minSdk 24
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // Required for chaquopy
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
        debug {
            debuggable true
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
        // Keep native libs required by yt-dlp/FFmpeg
        pickFirst "lib/*/libpython*.so"
        pickFirst "lib/*/libssl*.so"
        pickFirst "lib/*/libcrypto*.so"
    }
}

// Chaquopy – embeds CPython + yt-dlp into the APK
apply plugin: "com.chaquo.python"

chaquopy {
    defaultConfig {
        version "3.11"
        pip {
            install "yt-dlp"
            install "mutagen"          // ID3 tags for MP3
            install "certifi"          // SSL certs
        }
    }
    productFlavors {}
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    // WorkManager for background downloads
    implementation "androidx.work:work-runtime-ktx:2.9.1"
    // Notification support
    implementation "androidx.core:core-ktx:1.13.1"
    // FFmpegKit for audio/video merging
    implementation "com.arthenica:ffmpeg-kit-full:6.0-2"
    // Coroutines
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
    // Gson for JSON
    implementation "com.google.code.gson:gson:2.11.0"
    // OkHttp for networking
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}

flutter {
    source "../.."
}
