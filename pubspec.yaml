name: rainax_downloader
description: RAINAX – Android Video & Audio Downloader powered by yt-dlp
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Storage & permissions
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fluttertoast: ^8.2.6
  lottie: ^3.1.2

  # Networking
  http: ^1.2.2
  dio: ^5.6.0

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  open_filex: ^4.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
